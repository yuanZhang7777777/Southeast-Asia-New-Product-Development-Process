<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>海外仓字段责任确认操作台 - Codex版</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #ffffff;
      --panel2: #fbfcfa;
      --ink: #1f2723;
      --muted: #667169;
      --soft: #8b968f;
      --line: #dfe5dd;
      --line2: #cbd4cc;
      --green: #2f7752;
      --green-bg: #eaf5ee;
      --blue: #2f6287;
      --blue-bg: #eaf2f7;
      --amber: #9a6b18;
      --amber-bg: #fbf1dc;
      --red: #b4493f;
      --red-bg: #fae9e7;
      --shadow: 0 12px 30px rgba(24, 34, 29, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.55;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(246, 247, 244, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .top-inner {
      max-width: 1240px;
      margin: 0 auto;
      padding: 14px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .title {
      display: grid;
      gap: 2px;
      min-width: 280px;
    }
    .title strong {
      font-size: 19px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .title span {
      color: var(--muted);
      font-size: 12px;
    }
    .top-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn {
      border: 1px solid var(--line2);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      padding: 8px 12px;
      min-height: 36px;
    }
    .btn:hover { border-color: var(--green); color: var(--green); }
    .btn.primary {
      border-color: var(--green);
      background: var(--green);
      color: white;
    }
    .btn.ghost { background: transparent; }
    .app {
      max-width: 1240px;
      margin: 0 auto;
      padding: 18px 22px 54px;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 16px;
    }
    .sidebar, .main, .strip, .workbench {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .sidebar {
      overflow: hidden;
      align-self: start;
      position: sticky;
      top: 77px;
      max-height: calc(100vh - 96px);
      display: flex;
      flex-direction: column;
    }
    .side-head {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel2);
      display: grid;
      gap: 8px;
    }
    .search {
      width: 100%;
      border: 1px solid var(--line2);
      border-radius: 8px;
      padding: 8px 10px;
      background: white;
    }
    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .filter-row select {
      border: 1px solid var(--line2);
      border-radius: 8px;
      padding: 7px 8px;
      background: white;
      min-width: 0;
    }
    .table-list {
      overflow: auto;
    }
    .table-item {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: white;
      text-align: left;
      padding: 12px;
      display: grid;
      gap: 6px;
    }
    .table-item:hover { background: #f8faf7; }
    .table-item.active {
      background: var(--green-bg);
      box-shadow: inset 3px 0 0 var(--green);
    }
    .table-name {
      font-weight: 700;
      font-size: 13.5px;
      line-height: 1.35;
    }
    .table-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      color: var(--muted);
      font-size: 11.5px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 2px 8px;
      border: 1px solid transparent;
      white-space: nowrap;
      font-size: 11.5px;
      line-height: 1.5;
    }
    .pill.ok { color: var(--green); background: var(--green-bg); border-color: #bfdfc9; }
    .pill.tbd { color: var(--amber); background: var(--amber-bg); border-color: #edd9ab; }
    .pill.info { color: var(--blue); background: var(--blue-bg); border-color: #c2d8e8; }
    .pill.warn { color: var(--red); background: var(--red-bg); border-color: #efc6c2; }
    .main {
      min-width: 0;
      overflow: hidden;
    }
    .summary {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel2);
      display: grid;
      gap: 12px;
    }
    .summary-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
      letter-spacing: 0;
    }
    .sub {
      color: var(--muted);
      font-size: 12.5px;
      margin-top: 5px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
    }
    .score {
      display: grid;
      grid-template-columns: repeat(3, minmax(86px, 1fr));
      gap: 8px;
    }
    .metric {
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      padding: 9px 10px;
      min-width: 86px;
    }
    .metric b {
      display: block;
      font-size: 19px;
      line-height: 1.2;
    }
    .metric span {
      color: var(--muted);
      font-size: 11.5px;
    }
    .flow {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .step {
      border: 1px solid var(--line2);
      background: white;
      border-radius: 8px;
      padding: 7px 10px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .step.active {
      color: var(--green);
      border-color: #b9dcc6;
      background: var(--green-bg);
      font-weight: 700;
    }
    .content {
      display: flex;
      flex-direction: column;
      min-height: 560px;
    }
    .fields {
      min-width: 0;
      padding: 16px;
    }
    .panel-head {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .panel-head h2 {
      margin: 0;
      font-size: 15px;
    }
    .add-form {
      border: 1px solid var(--line);
      background: #f8faf7;
      border-radius: 8px;
      padding: 10px;
      margin: 0 0 12px;
      display: grid;
      grid-template-columns: minmax(180px, 1.4fr) minmax(120px, .8fr) minmax(110px, .65fr) minmax(180px, 1.3fr) auto;
      gap: 8px;
      align-items: start;
    }
    .add-input, .add-select {
      width: 100%;
      border: 1px solid var(--line2);
      border-radius: 8px;
      padding: 8px 9px;
      background: white;
      min-height: 38px;
    }
    .add-input::placeholder { color: var(--soft); }
    .field-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .field-table th {
      background: #f2f5f1;
      color: var(--muted);
      font-weight: 700;
      text-align: left;
      padding: 8px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
    }
    .field-table td {
      padding: 8px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      word-break: break-word;
    }
    .field-table tr:last-child td { border-bottom: 0; }
    .field-table tr.system-row td { color: var(--soft); background: #fcfdfb; }
    .field-name {
      font-weight: 700;
      color: var(--ink);
    }
    .system-row .field-name { color: var(--soft); }
    .owner-select, .status-select, .note-input {
      width: 100%;
      border: 1px solid var(--line2);
      border-radius: 8px;
      padding: 7px 8px;
      background: white;
      min-height: 34px;
    }
    .owner-select.pending, .status-select.pending {
      border-color: #edd9ab;
      background: #fff8e8;
    }
    .note-input {
      resize: none;
      min-height: 38px;
      color: var(--muted);
      overflow: hidden;
      line-height: 1.45;
    }
    .right {
      min-width: 0;
      padding: 16px;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(0, 1fr) minmax(0, .85fr);
      gap: 12px;
      align-content: start;
      border-bottom: 1px solid var(--line);
      background: var(--panel2);
    }
    .side-section {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-width: 0;
    }
    .side-section h3 {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--ink);
    }
    .compact-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      display: grid;
      gap: 6px;
      font-size: 12.5px;
    }
    .link-line {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12.5px;
    }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #1f2723;
      color: white;
      border-radius: 8px;
      padding: 11px 14px;
      opacity: 0;
      transform: translateY(8px);
      transition: .18s ease;
      z-index: 80;
      max-width: 360px;
      box-shadow: var(--shadow);
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; padding: 14px; }
      .sidebar { position: static; max-height: none; }
      .right { grid-template-columns: 1fr; }
      .add-form { grid-template-columns: 1fr 1fr; }
      .summary-top { grid-template-columns: 1fr; }
      .score { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 620px) {
      .top-inner { align-items: stretch; flex-direction: column; padding: 12px 14px; }
      .top-actions { margin-left: 0; justify-content: flex-start; }
      .score { grid-template-columns: 1fr; }
      .add-form { grid-template-columns: 1fr; }
      .field-table { display: block; overflow-x: auto; table-layout: auto; }
      .field-table th, .field-table td { min-width: 140px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="top-inner">
      <div class="title">
        <strong>海外仓字段责任确认操作台</strong>
        <span>Codex版 · 2026-06-26 · 现场逐表确认谁填什么</span>
      </div>
      <div class="top-actions">
        <button class="btn" id="showPendingBtn">只看待确认</button>
        <button class="btn" id="resetBtn">重置本地修改</button>
        <button class="btn primary" id="exportBtn">导出确认结果</button>
      </div>
    </div>
  </header>

  <div class="app">
    <aside class="sidebar">
      <div class="side-head">
        <input class="search" id="searchInput" placeholder="搜索表名或字段">
        <div class="filter-row">
          <select id="roleFilter">
            <option value="">全部角色</option>
          </select>
          <select id="statusFilter">
            <option value="">全部状态</option>
            <option value="已确认">已确认</option>
            <option value="待确认">待确认</option>
            <option value="系统带出">系统带出</option>
          </select>
        </div>
      </div>
      <div class="table-list" id="tableList"></div>
    </aside>

    <main class="main">
      <section class="summary">
        <div class="summary-top">
          <div>
            <h1 id="tableTitle"></h1>
            <div class="sub" id="tableSub"></div>
          </div>
          <div class="score">
            <div class="metric"><b id="metricFields">0</b><span>人工字段</span></div>
            <div class="metric"><b id="metricPending">0</b><span>待确认</span></div>
            <div class="metric"><b id="metricSystem">0</b><span>系统带出</span></div>
          </div>
        </div>
        <div class="flow" id="flow"></div>
      </section>

      <section class="content">
        <aside class="right">
          <section class="side-section">
            <h3>当前口径</h3>
            <div class="link-line" id="currentJudgement"></div>
          </section>
          <section class="side-section">
            <h3>确认点</h3>
            <ol class="compact-list" id="questionList"></ol>
          </section>
          <section class="side-section">
            <h3>流转</h3>
            <div class="link-line" id="handoff"></div>
          </section>
        </aside>
        <div class="fields">
          <div class="panel-head">
            <h2>字段责任</h2>
          </div>
          <div class="add-form">
            <input class="add-input" id="addName" placeholder="新增字段名，例如：调价确认人">
            <select class="add-select" id="addOwner"></select>
            <select class="add-select" id="addStatus">
              <option value="待确认">待确认</option>
              <option value="已确认">已确认</option>
              <option value="系统带出">系统带出</option>
            </select>
            <input class="add-input" id="addNote" placeholder="备注，例如：到货后填写">
            <button class="btn primary" id="addFieldBtn">添加到当前表</button>
          </div>
          <table class="field-table">
            <thead>
              <tr>
                <th style="width: 28%;">字段</th>
                <th style="width: 22%;">谁填</th>
                <th style="width: 15%;">状态</th>
                <th>备注</th>
              </tr>
            </thead>
            <tbody id="fieldRows"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>

      {

          field("单销 / 成本 / 头程 / 库存 / 首次上架时间 / 产品定义", "系统带出", "系统带出", "当前表 G-V"),

      },
      {

        name: "【推品】海外仓精品流程",
        cadence: "上架后周度",

        judgement: "推品表是上架后执行销售策略和周度复盘；数据跟进建议系统带出，不让人工填指标。",
        questions: [
          "销售策略由店铺运营填还是运营填？",
          "周度数据是否全部从 ERP/数据复盘带出？",
          "复盘按自然周，还是到货后第7/14/21天？"
        ],
        fields: [
          field("操作日期 / 主SKU / 国家 / 店铺运营 / 店铺 / Item", "系统带出", "系统带出", "当前表 A-F，可由系统预填或店铺运营补充Item"),
          field("优化 / 刷单 / 广告 / 联盟 / 活动 / 其他(G-L)", "待确认", "待确认", "销售策略"),
          field("第一至第四周订单量、总收入、一次毛利额、毛利率", "系统带出", "系统带出", "当前表 M-P、T-W、AA-AD、AH-AK"),
          field("一至三次复盘时间 / 产品定位 / 优化操作", "待确认", "待确认", "当前表 Q-S、X-Z、AE-AG"),
          field("总结(AL)", "待确认", "待确认", "")

    const STORAGE_KEY = "ow_codex_field_owner_20260626_v2";
    let tables = loadTables();
    let activeId = tables[0].id;
    let pendingOnly = false;

    const $ = (id) => document.getElementById(id);

    function loadTables() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return normalizeTables(JSON.parse(raw));
      } catch (error) {}
      return normalizeTables(JSON.parse(JSON.stringify(DEFAULT_TABLES)));
    }

    function normalizeTables(input) {
      input.forEach((table) => {
        table.fields.forEach((item) => {
          if (item.owner === "销售员") item.owner = "店铺运营";
          if (item.owner === "销售主管/部门负责人") item.owner = "运营主管/部门负责人";
        });
      });
      return input;
    }

    function saveTables() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tables));
    }

    function esc(value) {
      return String(value == null ? "" : value).replace(/[&<>"]/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;"
      }[ch]));
    }

    function activeTable() {
      return tables.find((item) => item.id === activeId) || tables[0];
    }

    function isSystem(field) {
      return field.owner === "系统带出" || field.status === "系统带出";
    }

    function visibleField(field) {
      const role = $("roleFilter").value;
      const status = $("statusFilter").value;
      const term = $("searchInput").value.trim().toLowerCase();
      if (pendingOnly && field.status !== "待确认") return false;
      if (role && field.owner !== role) return false;
      if (status && field.status !== status) return false;
      if (term) {
        return field.name.toLowerCase().includes(term) || field.note.toLowerCase().includes(term);
      }
      return true;
    }

    function tableMatches(table) {
      const term = $("searchInput").value.trim().toLowerCase();
      if (!term) return true;
      if (table.name.toLowerCase().includes(term)) return true;
      return table.fields.some((field) =>
        field.name.toLowerCase().includes(term) ||
        field.note.toLowerCase().includes(term)
      );
    }

    function statusClass(status) {
      if (status === "已确认") return "ok";
      if (status === "系统带出") return "info";
      return "tbd";
    }

    function renderRoleOptions() {
      $("roleFilter").innerHTML = '<option value="">全部角色</option>' +
        ROLES.filter((role) => role !== "待确认").map((role) => `<option value="${esc(role)}">${esc(role)}</option>`).join("");
      $("addOwner").innerHTML = ROLES.map((role) =>
        `<option value="${esc(role)}" ${role === "待确认" ? "selected" : ""}>${esc(role)}</option>`
      ).join("");
    }

    function renderList() {
      const html = tables
        .filter(tableMatches)
        .map((table) => {
          const manual = table.fields.filter((field) => !isSystem(field));
          const pending = manual.filter((field) => field.status === "待确认").length;
          const ok = manual.filter((field) => field.status === "已确认").length;
          return `
            <button class="table-item ${table.id === activeId ? "active" : ""}" data-id="${esc(table.id)}">
              <div class="table-name">${esc(table.name)}</div>
              <div class="table-meta">
                <span>${esc(table.cadence)}</span>
                <span class="pill ${pending ? "tbd" : "ok"}">${pending ? `待确认 ${pending}` : "已确认"}</span>
                <span class="pill info">人工 ${manual.length}</span>
                ${ok ? `<span class="pill ok">已定 ${ok}</span>` : ""}
              </div>
            </button>
          `;
        }).join("");
      $("tableList").innerHTML = html || '<div style="padding:14px;color:var(--muted)">没有匹配项</div>';
      $("tableList").querySelectorAll("[data-id]").forEach((button) => {
        button.onclick = () => {
          activeId = button.dataset.id;
          render();
        };
      });
    }

    function renderSummary() {
      const table = activeTable();
      const manual = table.fields.filter((field) => !isSystem(field));
      const pending = manual.filter((field) => field.status === "待确认").length;
      const system = table.fields.filter(isSystem).length;
      $("tableTitle").textContent = table.name;
      $("tableSub").innerHTML = `
        <span>频率：${esc(table.cadence)}</span>
        <span>上游：${esc(table.upstream)}</span>
        <span>下游：${esc(table.downstream)}</span>
      `;
      $("metricFields").textContent = manual.length;
      $("metricPending").textContent = pending;
      $("metricSystem").textContent = system;
      $("flow").innerHTML = FLOW.map(([id, label]) =>
        `<button class="step ${id === activeId ? "active" : ""}" data-id="${esc(id)}">${esc(label)}</button>`
      ).join("");
      $("flow").querySelectorAll("[data-id]").forEach((button) => {
        button.onclick = () => {
          activeId = button.dataset.id;
          render();
        };
      });
    }

    function renderFields() {
      const table = activeTable();
      const rows = table.fields
        .map((field, index) => ({ field, index }))
        .filter(({ field }) => visibleField(field))
        .map(({ field, index }) => {
          const ownerOptions = ROLES.map((role) =>
            `<option value="${esc(role)}" ${role === field.owner ? "selected" : ""}>${esc(role)}</option>`
          ).join("");
          const statusOptions = ["待确认", "已确认", "系统带出"].map((status) =>
            `<option value="${esc(status)}" ${status === field.status ? "selected" : ""}>${esc(status)}</option>`
          ).join("");
          const systemClass = isSystem(field) ? "system-row" : "";
          const pendingClass = field.status === "待确认" ? "pending" : "";
          return `
            <tr class="${systemClass}">
              <td><div class="field-name">${esc(field.name)}</div></td>
              <td>
                <select class="owner-select ${pendingClass}" data-owner="${index}">
                  ${ownerOptions}
                </select>
              </td>
              <td>
                <select class="status-select ${pendingClass}" data-status="${index}">
                  ${statusOptions}
                </select>
              </td>
              <td>
                <textarea class="note-input" data-note="${index}" rows="1">${esc(field.note)}</textarea>
              </td>
            </tr>
          `;
        }).join("");
      $("fieldRows").innerHTML = rows || '<tr><td colspan="4" style="color:var(--muted)">当前筛选下没有字段</td></tr>';
      $("fieldRows").querySelectorAll("[data-owner]").forEach((select) => {
        select.onchange = () => {
          const item = activeTable().fields[Number(select.dataset.owner)];
          item.owner = select.value;
          if (select.value === "系统带出") item.status = "系统带出";
          if (select.value !== "待确认" && item.status === "待确认") item.status = "已确认";
          saveTables();
          render();
        };
      });
      $("fieldRows").querySelectorAll("[data-status]").forEach((select) => {
        select.onchange = () => {
          const item = activeTable().fields[Number(select.dataset.status)];
          item.status = select.value;
          if (select.value === "系统带出") item.owner = "系统带出";
          if (select.value === "待确认" && item.owner !== "系统带出") item.owner = item.owner || "待确认";
          saveTables();
          render();
        };
      });
      $("fieldRows").querySelectorAll("[data-note]").forEach((textarea) => {
        autoGrow(textarea);
        textarea.oninput = () => {
          activeTable().fields[Number(textarea.dataset.note)].note = textarea.value;
          saveTables();
          autoGrow(textarea);
        };
      });
    }

    function autoGrow(textarea) {
      textarea.style.height = "0px";
      textarea.style.height = Math.max(38, textarea.scrollHeight) + "px";
    }

    function renderRight() {
      const table = activeTable();
      $("currentJudgement").innerHTML = `<span>${esc(table.judgement)}</span>`;
      $("questionList").innerHTML = table.questions.map((question) => `<li>${esc(question)}</li>`).join("");
      $("handoff").innerHTML = `
        <span>上游：${esc(table.upstream)}</span>
        <span>提交后流向：${esc(table.downstream)}</span>
      `;
    }

    function render() {
      renderList();
      renderSummary();
      renderFields();
      renderRight();
      $("showPendingBtn").textContent = pendingOnly ? "显示全部字段" : "只看待确认";
    }

    function exportText() {
      const lines = [
        "海外仓字段责任确认结果 - Codex版",
        "导出时间：" + new Date().toLocaleString("zh-CN"),
        ""
      ];
      tables.forEach((table) => {
        lines.push("【" + table.name + "】");
        lines.push("频率：" + table.cadence);
        lines.push("上游：" + table.upstream + "；下游：" + table.downstream);
        lines.push("当前判断：" + table.judgement);
        lines.push("字段：");
        table.fields.forEach((field) => {
          lines.push("  - " + field.name + "｜" + field.owner + "｜" + field.status + (field.note ? "｜" + field.note : ""));
        });
        lines.push("确认点：");
        table.questions.forEach((question) => lines.push("  - " + question));
        lines.push("");
      });
      const blob = new Blob(["\ufeff" + lines.join("\n")], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "海外仓字段责任确认结果-Codex版.txt";
      a.click();
      URL.revokeObjectURL(url);
      toast("已导出确认结果");
    }

    function toast(message) {
      const box = $("toast");
      box.textContent = message;
      box.classList.add("show");
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => box.classList.remove("show"), 2200);
    }

    $("searchInput").oninput = render;
    $("roleFilter").onchange = render;
    $("statusFilter").onchange = render;
    $("showPendingBtn").onclick = () => {
      pendingOnly = !pendingOnly;
      render();
    };
    $("resetBtn").onclick = () => {
      if (!confirm("确认重置本地修改？")) return;
      localStorage.removeItem(STORAGE_KEY);
      tables = loadTables();
      activeId = tables[0].id;
      render();
      toast("已重置");
    };
    $("exportBtn").onclick = exportText;
    function addFieldFromForm() {
      const name = $("addName").value.trim();
      if (!name) return;
      const owner = $("addOwner").value;
      const status = owner === "系统带出" ? "系统带出" : $("addStatus").value;
      const note = $("addNote").value.trim();
      activeTable().fields.push(field(name, owner, status, note));
      $("addName").value = "";
      $("addOwner").value = "待确认";
      $("addStatus").value = "待确认";
      $("addNote").value = "";
      saveTables();
      render();
      toast("已添加字段");
      $("addName").focus();
    }
    $("addFieldBtn").onclick = addFieldFromForm;
    $("addName").addEventListener("keydown", (event) => {
      if (event.key === "Enter") addFieldFromForm();
    });
    $("addOwner").onchange = () => {
      if ($("addOwner").value === "系统带出") $("addStatus").value = "系统带出";
    };

    renderRoleOptions();
    render();
  </script>
